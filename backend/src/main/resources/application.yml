server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/tourism_qa?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  neo4j:
    uri: ${NEO4J_URI:bolt://127.0.0.1:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD}

app:
  security:
    jwt-secret: ${JWT_SECRET}
    jwt-expiration-minutes: 720
    first-user-admin: true
  llm:
    default-provider: siliconflow
    default-model: Qwen/Qwen2.5-7B-Instruct
    providers:
      siliconflow:
        enabled: true
        base-url: https://api.siliconflow.cn/v1
        api-key: ${SILICONFLOW_API_KEY}
        models:
          - id: Qwen/Qwen2.5-7B-Instruct
            display-name: Qwen2.5 7B Instruct
          - id: deepseek-ai/DeepSeek-V3
            display-name: DeepSeek V3
      ollama:
        enabled: true
        base-url: http://localhost:11434
        models:
          - id: qwen2.5:7b
            display-name: Ollama Qwen2.5 7B
  knowledge-graph:
    enabled: true
    context-node-limit: 6
    context-relationship-limit: 24
    context-term-limit: 8
  realtime:
    enabled: true
    weather:
      enabled: true
      base-url: https://api.open-meteo.com
      timezone: Asia/Shanghai
      forecast-days: 3
      max-forecast-days: 7
    attraction-status:
      enabled: true
      max-items: 3

logging:
  level:
    org.springframework.security: INFO
    com.tourismqa: DEBUG
    com.tourismqa.service.SiliconFlowClient: DEBUG
